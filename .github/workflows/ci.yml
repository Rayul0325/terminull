name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build-test-lint
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
        node: [22]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Must run BEFORE setup-node: setup-node@v5 enables pnpm caching by default
      # when package.json#packageManager is pnpm, and that cache probe executes pnpm.
      - name: Set up pnpm (version from package.json#packageManager)
        uses: pnpm/action-setup@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      # No lockfile freeze yet during pre-alpha, so allow pnpm to resolve.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

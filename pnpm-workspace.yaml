packages:
  - 'packages/*'
  - 'packages/adapters/*'

# Ignored build scripts are a non-fatal warning rather than a hard install
# failure. Needed because pnpm 11 otherwise exits non-zero when any dependency's
# build script is skipped.
strictDepBuilds: false

# Native/postinstall build scripts we intentionally skip:
#  - esbuild: works from its prebuilt platform package (@esbuild/*), so its
#    postinstall is unnecessary (verified: vitest + vite build both run green).
ignoredBuiltDependencies:
  - esbuild

# Native build scripts we DO run:
#  - node-pty: @terminull/session-host (paneld) imports it for real PTY-backed
#    sessions. Its shipped darwin prebuild's spawn-helper is not marked
#    executable, so posix_spawnp fails at runtime; a real native build produces
#    an executable spawn-helper under build/Release. Requires a C/C++ toolchain
#    (macOS CommandLineTools / Xcode).
#  - electron: its postinstall downloads the platform binary — without it the
#    @terminull/desktop devDependency is an empty shell (M10 contract-listed).
#    NOT a native module in our code: the desktop shell itself stays pure JS.
onlyBuiltDependencies:
  - node-pty
  - electron

allowBuilds:
  esbuild: set this to true or false
